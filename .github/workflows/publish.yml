name: publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          # Provenance/SBOM would wrap the push in an OCI index; the in-app
          # update checker expects :latest to resolve to a plain manifest.
          provenance: false
          sbom: false
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/ctb3/monthly-expense-helper:latest
            ghcr.io/ctb3/monthly-expense-helper:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
